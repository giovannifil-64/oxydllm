# ─────────────────────────────────────────────────────────────────────────────
# nightly.yml — Nightly builds from main
#
# Triggered by:
#   - Cron schedule: every day at 03:00 UTC
#   - Manual dispatch (workflow_dispatch)
#
# Creates/updates a rolling "nightly" pre-release on GitHub with the
# latest binaries. Docker images are tagged :nightly and :nightly-cpu.
#
# The nightly release is always a pre-release and always overwrites the
# previous nightly — users get exactly one "nightly" entry, not a flood.
# ─────────────────────────────────────────────────────────────────────────────

name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# Only one nightly build at a time
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # ── Guard: skip if no new commits since last nightly ────────────────────────
  check-changes:
    name: Check for new commits
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for commits in last 25 hours
        id: check
        run: |
          # For manual dispatch, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — building."
            exit 0
          fi

          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DIFF=$((NOW - LAST_COMMIT))
          THRESHOLD=90000  # 25 hours in seconds

          if [ "$DIFF" -lt "$THRESHOLD" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "New commits found (${DIFF}s ago) — building."
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No new commits (last: ${DIFF}s ago) — skipping."
          fi

  build:
    name: Build all targets
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      channel: nightly
      version_tag: nightly
      push_docker: true
    permissions:
      contents: read
      packages: write

  release-nightly:
    name: Update nightly release
    needs: [check-changes, build]
    if: ${{ always() && needs.check-changes.outputs.should_build == 'true' && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: oxydllm-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Ensure at least one packaged binary exists
        run: |
          COUNT=$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "No packaged binaries found; keeping previous nightly release unchanged."
            exit 1
          fi

      - name: Get short SHA and date
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Delete previous nightly release + tag (if exists) so we can recreate it
      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.meta.outputs.date }} · ${{ steps.meta.outputs.sha_short }})"
          files: dist/*
          prerelease: true
          draft: false
          body: |
            ## Nightly build

            Built from `main` at commit `${{ steps.meta.outputs.sha_short }}` on ${{ steps.meta.outputs.date }}.
            Build workflow result: `${{ needs.build.result }}`.

            Some targets may be missing when one or more build jobs fail.

            > **Warning**: Nightly builds are untested and may contain breaking changes.
            > Use a tagged release for production.

            ### Install

            **macOS (Apple Silicon)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | OXYDLLM_CHANNEL=nightly sh
            ```

            **Linux x86_64 (CUDA)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | OXYDLLM_CHANNEL=nightly sh
            ```

            **Linux arm64 (CUDA — GH200 / GB300 / Jetson Thor / DGX Spark)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | OXYDLLM_CHANNEL=nightly sh
            ```

            Installer auto-selects the right CUDA target from detected GPU compute capability.
            Override with `OXYDLLM_CUDA_TARGET`: x86_64 values: `ada`, `hopper`, `blackwell`, `blackwell-ultra`, `blackwell-desktop`; arm64 values: `hopper`, `blackwell`, `blackwell-ultra`, `thor`, `blackwell-desktop`.

            **Linux (CPU)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | OXYDLLM_CHANNEL=nightly OXYDLLM_NO_GPU=1 sh
            ```

            **Docker (CUDA)**
            ```bash
            docker run --gpus all -p 11313:11313 \
              -v ~/.oxydllm/models:/root/.oxydllm/models \
              ghcr.io/${{ github.repository }}:nightly start
            ```

            x86_64 per-arch nightlies: `:nightly-cuda-ada`, `:nightly-cuda-hopper`, `:nightly-cuda-blackwell`, `:nightly-cuda-blackwell-ultra`, `:nightly-cuda-blackwell-desktop`.
            ARM64 per-arch nightlies: `:nightly-cuda-hopper-arm64`, `:nightly-cuda-blackwell-arm64`, `:nightly-cuda-blackwell-ultra-arm64`, `:nightly-cuda-thor-arm64`, `:nightly-cuda-blackwell-desktop-arm64`.

            **Docker (CPU)**
            ```bash
            docker run -p 11313:11313 \
              -v ~/.oxydllm/models:/root/.oxydllm/models \
              ghcr.io/${{ github.repository }}:nightly-cpu start
            ```
  cleanup-ghcr:
    name: Cleanup untagged GHCR images
    needs: [release-nightly]
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: oxydllm
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: true