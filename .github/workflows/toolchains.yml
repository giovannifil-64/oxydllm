# ─────────────────────────────────────────────────────────────────────────────
# toolchains.yml — Weekly full-matrix test across every supported Rust stable
#
# Per-push CI covers the bounds (MSRV floor in ci.yml, latest stable
# informational); this sweep proves every stable in between still builds and
# passes the suite. Non-blocking by nature (scheduled), manual dispatch for
# on-demand runs (e.g. before a release).
# When a new stable lands, add it here; the `stable` entry always covers the
# newest without edits.
# ─────────────────────────────────────────────────────────────────────────────

name: Toolchain sweep

on:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  sweep:
    name: Test · Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.94.0"
          - "1.94.1"
          - "1.95.0"
          - "1.96.0"
          - "1.96.1"
          - "1.97.0"
          - "1.97.1"
          - "stable"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: sweep-${{ matrix.toolchain }}
          save-if: false

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Unit tests
        run: cargo test --release --no-default-features -- --test-threads=4
