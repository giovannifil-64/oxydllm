# ─────────────────────────────────────────────────────────────────────────────
# build.yml — Reusable workflow: builds native binaries + Docker images
#
# Called by release.yml (on v* tags) and nightly.yml (on cron / manual).
# Not triggered directly.
# ─────────────────────────────────────────────────────────────────────────────

name: Build

on:
  workflow_call:
    inputs:
      # "release" or "nightly"
      channel:
        required: true
        type: string
      # The version tag (e.g. "v0.1.0" for release, "nightly" for nightly)
      version_tag:
        required: true
        type: string
      # Whether to push Docker images to GHCR
      push_docker:
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.94.1

jobs:
  # ── macOS Apple Silicon (Metal) ─────────────────────────────────────────────
  build-macos-metal:
    name: Build · macOS arm64 (Metal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-macos-arm64-metal

      - name: Build (Metal, release)
        run: cargo build --release

      - name: Strip binary (macOS release artifact)
        run: strip -x target/release/oxydllm

      - name: Package binary
        run: |
          cd target/release
          tar -czf ../../oxydllm-macos-arm64.tar.gz oxydllm
          cd ../..
          shasum -a 256 oxydllm-macos-arm64.tar.gz > oxydllm-macos-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-macos-arm64
          path: |
            oxydllm-macos-arm64.tar.gz
            oxydllm-macos-arm64.tar.gz.sha256
          retention-days: 7

  # ── Linux CPU ───────────────────────────────────────────────────────────────
  build-linux-cpu:
    name: Build · Linux x86_64 (CPU)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-linux-x86_64-cpu

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Build (CPU-only, release)
        run: cargo build --release --no-default-features

      - name: Strip binary (Linux CPU release artifact)
        run: strip --strip-unneeded target/release/oxydllm

      - name: Package binary
        run: |
          cd target/release
          tar -czf ../../oxydllm-linux-x86_64-cpu.tar.gz oxydllm
          cd ../..
          sha256sum oxydllm-linux-x86_64-cpu.tar.gz > oxydllm-linux-x86_64-cpu.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-linux-x86_64-cpu
          path: |
            oxydllm-linux-x86_64-cpu.tar.gz
            oxydllm-linux-x86_64-cpu.tar.gz.sha256
          retention-days: 7

  # ── Linux CUDA ──────────────────────────────────────────────────────────────
  build-linux-cuda:
    name: Build · Linux x86_64 (CUDA ${{ matrix.variant.label }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: sm_89 (Ada)
            arch: "89"
            tar_suffix: cuda-ada
            legacy_alias: true
          - label: sm_90 (Hopper)
            arch: "90"
            tar_suffix: cuda-hopper
            legacy_alias: false
          - label: sm_100 (Blackwell datacenter)
            arch: "100"
            tar_suffix: cuda-blackwell
            legacy_alias: false
          - label: sm_103 (Blackwell Ultra)
            arch: "103"
            tar_suffix: cuda-blackwell-ultra
            legacy_alias: false
          - label: sm_120 (Blackwell consumer, RTX 50xx)
            arch: "120"
            tar_suffix: cuda-blackwell-consumer
            legacy_alias: false
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu22.04
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl build-essential pkg-config libssl-dev git ca-certificates

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_TOOLCHAIN" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-linux-x86_64-cuda-sm${{ matrix.variant.arch }}

      - name: Build (CUDA, release)
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant.arch }}
        run: cargo build --release --no-default-features --features cuda

      - name: Strip binary (Linux CUDA release artifact)
        run: strip --strip-unneeded target/release/oxydllm

      - name: Package binary
        run: |
          cd target/release
          TAR_NAME="oxydllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz"
          tar -czf ../../"${TAR_NAME}" oxydllm
          cd ../..
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"

          if [ "${{ matrix.variant.legacy_alias }}" = "true" ]; then
            cp "${TAR_NAME}" oxydllm-linux-x86_64-cuda.tar.gz
            sha256sum oxydllm-linux-x86_64-cuda.tar.gz > oxydllm-linux-x86_64-cuda.tar.gz.sha256
          fi

      - name: Upload CUDA target artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-linux-x86_64-${{ matrix.variant.tar_suffix }}
          path: |
            oxydllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz
            oxydllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz.sha256
          retention-days: 7

      - name: Upload CUDA legacy artifact alias (sm_89)
        if: matrix.variant.legacy_alias
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-linux-x86_64-cuda
          path: |
            oxydllm-linux-x86_64-cuda.tar.gz
            oxydllm-linux-x86_64-cuda.tar.gz.sha256
          retention-days: 7

  # ── Linux arm64 CPU ─────────────────────────────────────────────────────────
  build-linux-arm64-cpu:
    name: Build · Linux arm64 (CPU)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-linux-arm64-cpu

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Build (CPU-only, release)
        run: cargo build --release --no-default-features

      - name: Strip binary (Linux arm64 CPU release artifact)
        run: strip --strip-unneeded target/release/oxydllm

      - name: Package binary
        run: |
          cd target/release
          tar -czf ../../oxydllm-linux-arm64-cpu.tar.gz oxydllm
          cd ../..
          sha256sum oxydllm-linux-arm64-cpu.tar.gz > oxydllm-linux-arm64-cpu.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-linux-arm64-cpu
          path: |
            oxydllm-linux-arm64-cpu.tar.gz
            oxydllm-linux-arm64-cpu.tar.gz.sha256
          retention-days: 7

  # ── Linux arm64 CUDA ────────────────────────────────────────────────────────
  build-linux-arm64-cuda:
    name: Build · Linux arm64 (CUDA ${{ matrix.variant.label }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: sm_90 (Hopper / GH200)
            arch: "90"
            tar_suffix: cuda-hopper
          - label: sm_100 (Blackwell datacenter / DGX Spark)
            arch: "100"
            tar_suffix: cuda-blackwell
          - label: sm_103 (Blackwell Ultra / GB300)
            arch: "103"
            tar_suffix: cuda-blackwell-ultra
          - label: sm_110 (Thor / Jetson)
            arch: "110"
            tar_suffix: cuda-thor
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu22.04
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl build-essential pkg-config libssl-dev git ca-certificates

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_TOOLCHAIN" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-linux-arm64-cuda-sm${{ matrix.variant.arch }}

      - name: Build (CUDA, release)
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant.arch }}
        run: cargo build --release --no-default-features --features cuda

      - name: Strip binary (Linux arm64 CUDA release artifact)
        run: strip --strip-unneeded target/release/oxydllm

      - name: Package binary
        run: |
          TAR_NAME="oxydllm-linux-arm64-${{ matrix.variant.tar_suffix }}.tar.gz"
          cd target/release && tar -czf ../../"${TAR_NAME}" oxydllm && cd ../..
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxydllm-linux-arm64-${{ matrix.variant.tar_suffix }}
          path: |
            oxydllm-linux-arm64-${{ matrix.variant.tar_suffix }}.tar.gz
            oxydllm-linux-arm64-${{ matrix.variant.tar_suffix }}.tar.gz.sha256
          retention-days: 7

  # ── Docker CPU ──────────────────────────────────────────────────────────────
  docker-cpu:
    name: Docker · CPU (amd64)
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu-amd64" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' for semver tags
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu-amd64,${IMAGE}:${MAJOR_MINOR}-cpu-amd64,${IMAGE}:cpu-amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CPU image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=cpu-amd64
          cache-to: type=gha,mode=max,scope=cpu-amd64

      - name: Rebuild CPU image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          no-cache: true

  # ── Docker CPU (arm64) ─────────────────────────────────────────────────────
  docker-cpu-arm64:
    name: Docker · CPU (arm64)
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu-arm64" >> "$GITHUB_OUTPUT"
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu-arm64,${IMAGE}:${MAJOR_MINOR}-cpu-arm64,${IMAGE}:cpu-arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CPU arm64 image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=cpu-arm64
          cache-to: type=gha,mode=max,scope=cpu-arm64

      - name: Rebuild CPU arm64 image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          no-cache: true

  # ── Docker CPU manifest (multi-arch) ───────────────────────────────────────
  docker-cpu-manifest:
    name: Docker · CPU manifest (amd64+arm64)
    if: ${{ inputs.push_docker }}
    needs: [docker-cpu, docker-cpu-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute manifest tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu" >> "$GITHUB_OUTPUT"
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu,${IMAGE}:${MAJOR_MINOR}-cpu,${IMAGE}:cpu" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch CPU manifests
        run: |
          IFS=',' read -r -a TAGS <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done

  # ── Docker CUDA latest manifest ────────────────────────────────────────────
  # Policy: :latest = multi-arch CUDA image, Ada (amd64) + Hopper (arm64).
  # This is the recommended tag for production deployments on NVIDIA hardware.
  # Architecture-specific tags (:cuda-ada, :cuda-hopper, :cuda-blackwell, …)
  # remain available for deployments that require a precise compute capability.
  docker-cuda-latest-manifest:
    name: Docker · CUDA latest manifest (amd64+arm64)
    if: ${{ inputs.push_docker && inputs.channel == 'release' }}
    needs: [docker-cuda, docker-cuda-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push :latest and :cuda multi-arch manifests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAG="${{ inputs.version_tag }}"
          VER="${TAG#v}"
          MAJOR_MINOR="${VER%.*}"

          # Sources: Ada amd64 (best single-GPU for x86) + Hopper arm64 (GH200/DGX)
          ADA_AMD64="${IMAGE}:cuda-ada"
          HOPPER_ARM64="${IMAGE}:cuda-hopper-arm64"

          for manifest_tag in \
            "${IMAGE}:latest" \
            "${IMAGE}:cuda" \
            "${IMAGE}:${VER}" \
            "${IMAGE}:${VER}-cuda" \
            "${IMAGE}:${MAJOR_MINOR}" \
            "${IMAGE}:${MAJOR_MINOR}-cuda"; do
            docker buildx imagetools create \
              --tag "$manifest_tag" \
              "$ADA_AMD64" \
              "$HOPPER_ARM64"
          done

  # ── Docker CUDA ─────────────────────────────────────────────────────────────
  docker-cuda:
    name: Docker · CUDA (${{ matrix.variant.label }})
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: Ada (sm_89)
            arch: "89"
            tag: cuda-ada
            default_aliases: true
          - label: Hopper (sm_90)
            arch: "90"
            tag: cuda-hopper
            default_aliases: false
          - label: Blackwell datacenter (sm_100)
            arch: "100"
            tag: cuda-blackwell
            default_aliases: false
          - label: Blackwell Ultra (sm_103)
            arch: "103"
            tag: cuda-blackwell-ultra
            default_aliases: false
          - label: Blackwell consumer (sm_120, RTX 50xx)
            arch: "120"
            tag: cuda-blackwell-consumer
            default_aliases: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          ARCH_TAG="${{ matrix.variant.tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            TAGS="${IMAGE}:nightly-${ARCH_TAG}"
            if [ "${{ matrix.variant.default_aliases }}" = "true" ]; then
              # :nightly and :nightly-cuda point to Ada amd64 for nightly builds.
              # For release builds, :latest/:cuda are set by docker-cuda-latest-manifest
              # as a proper multi-arch manifest (Ada amd64 + Hopper arm64).
              TAGS="${TAGS},${IMAGE}:nightly,${IMAGE}:nightly-cuda"
            fi
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            # Arch-specific tags only — version aliases (:latest, :cuda, :{VER}, :{MAJOR_MINOR})
            # are created as multi-arch manifests by docker-cuda-latest-manifest.
            TAGS="${IMAGE}:${VER}-${ARCH_TAG},${IMAGE}:${MAJOR_MINOR}-${ARCH_TAG},${IMAGE}:${ARCH_TAG}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CUDA image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          cache-from: |
            type=gha,scope=cuda-${{ matrix.variant.arch }}
            type=gha
          cache-to: type=gha,mode=max,scope=cuda-${{ matrix.variant.arch }}

      - name: Rebuild CUDA image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          no-cache: true

  # ── Docker CUDA (arm64) ─────────────────────────────────────────────────────
  docker-cuda-arm64:
    name: Docker · CUDA arm64 (${{ matrix.variant.label }})
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: Hopper (sm_90)
            arch: "90"
            tag: cuda-hopper
          - label: Blackwell datacenter (sm_100)
            arch: "100"
            tag: cuda-blackwell
          - label: Blackwell Ultra (sm_103)
            arch: "103"
            tag: cuda-blackwell-ultra
          - label: Thor (sm_110)
            arch: "110"
            tag: cuda-thor
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          ARCH_TAG="${{ matrix.variant.tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            TAGS="${IMAGE}:nightly-${ARCH_TAG}-arm64"
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            TAGS="${IMAGE}:${VER}-${ARCH_TAG}-arm64,${IMAGE}:${MAJOR_MINOR}-${ARCH_TAG}-arm64,${IMAGE}:${ARCH_TAG}-arm64"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CUDA arm64 image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          cache-from: |
            type=gha,scope=cuda-arm64-${{ matrix.variant.arch }}
            type=gha
          cache-to: type=gha,mode=max,scope=cuda-arm64-${{ matrix.variant.arch }}

      - name: Rebuild CUDA arm64 image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          no-cache: true
