# ─────────────────────────────────────────────────────────────────────────────
# build.yml — Reusable workflow: builds native binaries + Docker images
#
# Called by release.yml (on v* tags) and nightly.yml (on cron / manual).
# Not triggered directly.
# ─────────────────────────────────────────────────────────────────────────────

name: Build

on:
  workflow_call:
    inputs:
      # "release" or "nightly"
      channel:
        required: true
        type: string
      # The version tag (e.g. "v0.1.0" for release, "nightly" for nightly)
      version_tag:
        required: true
        type: string
      # Whether to push Docker images to GHCR
      push_docker:
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.94.1

jobs:
  # ── macOS Apple Silicon (Metal) ─────────────────────────────────────────────
  build-macos-metal:
    name: Build · macOS arm64 (Metal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-arm64-metal-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-arm64-metal-

      - name: Build (Metal, release)
        run: cargo build --release

      - name: Strip binary (macOS release artifact)
        run: strip -x target/release/rllm

      - name: Package binary
        run: |
          cd target/release
          tar -czf ../../rllm-macos-arm64.tar.gz rllm
          cd ../..
          shasum -a 256 rllm-macos-arm64.tar.gz > rllm-macos-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rllm-macos-arm64
          path: |
            rllm-macos-arm64.tar.gz
            rllm-macos-arm64.tar.gz.sha256
          retention-days: 7

  # ── Linux CPU ───────────────────────────────────────────────────────────────
  build-linux-cpu:
    name: Build · Linux x86_64 (CPU)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-x86_64-cpu-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-x86_64-cpu-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Build (CPU-only, release)
        run: cargo build --release --no-default-features

      - name: Strip binary (Linux CPU release artifact)
        run: strip --strip-unneeded target/release/rllm

      - name: Package binary
        run: |
          cd target/release
          tar -czf ../../rllm-linux-x86_64-cpu.tar.gz rllm
          cd ../..
          sha256sum rllm-linux-x86_64-cpu.tar.gz > rllm-linux-x86_64-cpu.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rllm-linux-x86_64-cpu
          path: |
            rllm-linux-x86_64-cpu.tar.gz
            rllm-linux-x86_64-cpu.tar.gz.sha256
          retention-days: 7

  # ── Linux CUDA ──────────────────────────────────────────────────────────────
  build-linux-cuda:
    name: Build · Linux x86_64 (CUDA ${{ matrix.variant.label }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: sm_89 (Ada)
            arch: "89"
            tar_suffix: cuda-ada
            legacy_alias: true
          - label: sm_90 (Hopper)
            arch: "90"
            tar_suffix: cuda-hopper
            legacy_alias: false
          - label: sm_100 (Blackwell datacenter)
            arch: "100"
            tar_suffix: cuda-blackwell
            legacy_alias: false
          - label: sm_120 (Blackwell consumer, RTX 50xx)
            arch: "120"
            tar_suffix: cuda-blackwell-consumer
            legacy_alias: false
    container:
      image: nvidia/cuda:12.9.0-devel-ubuntu22.04
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl build-essential pkg-config libssl-dev git ca-certificates

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_TOOLCHAIN" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-x86_64-cuda-sm${{ matrix.variant.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-x86_64-cuda-sm${{ matrix.variant.arch }}-

      - name: Build (CUDA, release)
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant.arch }}
        run: cargo build --release --no-default-features --features cuda

      - name: Strip binary (Linux CUDA release artifact)
        run: strip --strip-unneeded target/release/rllm

      - name: Package binary
        run: |
          cd target/release
          TAR_NAME="rllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz"
          tar -czf ../../"${TAR_NAME}" rllm
          cd ../..
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"

          if [ "${{ matrix.variant.legacy_alias }}" = "true" ]; then
            cp "${TAR_NAME}" rllm-linux-x86_64-cuda.tar.gz
            sha256sum rllm-linux-x86_64-cuda.tar.gz > rllm-linux-x86_64-cuda.tar.gz.sha256
          fi

      - name: Upload CUDA target artifact
        uses: actions/upload-artifact@v7
        with:
          name: rllm-linux-x86_64-${{ matrix.variant.tar_suffix }}
          path: |
            rllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz
            rllm-linux-x86_64-${{ matrix.variant.tar_suffix }}.tar.gz.sha256
          retention-days: 7

      - name: Upload CUDA legacy artifact alias (sm_89)
        if: matrix.variant.legacy_alias
        uses: actions/upload-artifact@v7
        with:
          name: rllm-linux-x86_64-cuda
          path: |
            rllm-linux-x86_64-cuda.tar.gz
            rllm-linux-x86_64-cuda.tar.gz.sha256
          retention-days: 7

  # ── Docker CPU ──────────────────────────────────────────────────────────────
  docker-cpu:
    name: Docker · CPU (amd64)
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu-amd64" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' for semver tags
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu-amd64,${IMAGE}:${MAJOR_MINOR}-cpu-amd64,${IMAGE}:cpu-amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CPU image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=cpu-amd64
          cache-to: type=gha,mode=max,scope=cpu-amd64

      - name: Rebuild CPU image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          no-cache: true

  # ── Docker CPU (arm64) ─────────────────────────────────────────────────────
  docker-cpu-arm64:
    name: Docker · CPU (arm64)
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu-arm64" >> "$GITHUB_OUTPUT"
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu-arm64,${IMAGE}:${MAJOR_MINOR}-cpu-arm64,${IMAGE}:cpu-arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CPU arm64 image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=cpu-arm64
          cache-to: type=gha,mode=max,scope=cpu-arm64

      - name: Rebuild CPU arm64 image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          no-cache: true

  # ── Docker CPU manifest (multi-arch) ───────────────────────────────────────
  docker-cpu-manifest:
    name: Docker · CPU manifest (amd64+arm64)
    if: ${{ inputs.push_docker }}
    needs: [docker-cpu, docker-cpu-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute manifest tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            echo "tags=${IMAGE}:nightly-cpu" >> "$GITHUB_OUTPUT"
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            echo "tags=${IMAGE}:${VER}-cpu,${IMAGE}:${MAJOR_MINOR}-cpu,${IMAGE}:cpu" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch CPU manifests
        run: |
          IFS=',' read -r -a TAGS <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done

  # ── Docker CUDA ─────────────────────────────────────────────────────────────
  docker-cuda:
    name: Docker · CUDA (${{ matrix.variant.label }})
    if: ${{ inputs.push_docker }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: Ada (sm_89)
            arch: "89"
            tag: cuda-ada
            default_aliases: true
          - label: Hopper (sm_90)
            arch: "90"
            tag: cuda-hopper
            default_aliases: false
          - label: Blackwell datacenter (sm_100)
            arch: "100"
            tag: cuda-blackwell
            default_aliases: false
          - label: Blackwell consumer (sm_120, RTX 50xx)
            arch: "120"
            tag: cuda-blackwell-consumer
            default_aliases: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          CHANNEL="${{ inputs.channel }}"
          TAG="${{ inputs.version_tag }}"
          ARCH_TAG="${{ matrix.variant.tag }}"
          if [ "$CHANNEL" = "nightly" ]; then
            TAGS="${IMAGE}:nightly-${ARCH_TAG}"
            if [ "${{ matrix.variant.default_aliases }}" = "true" ]; then
              TAGS="${TAGS},${IMAGE}:nightly,${IMAGE}:nightly-cuda"
            fi
          else
            VER="${TAG#v}"
            MAJOR_MINOR="${VER%.*}"
            TAGS="${IMAGE}:${VER}-${ARCH_TAG},${IMAGE}:${MAJOR_MINOR}-${ARCH_TAG},${IMAGE}:${ARCH_TAG}"
            if [ "${{ matrix.variant.default_aliases }}" = "true" ]; then
              TAGS="${TAGS},${IMAGE}:${VER},${IMAGE}:${VER}-cuda,${IMAGE}:${MAJOR_MINOR},${IMAGE}:cuda,${IMAGE}:latest"
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CUDA image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          cache-from: |
            type=gha,scope=cuda-${{ matrix.variant.arch }}
            type=gha
          cache-to: type=gha,mode=max,scope=cuda-${{ matrix.variant.arch }}

      - name: Rebuild CUDA image without cache (fallback on cache failure)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CUDA_ARCH=${{ matrix.variant.arch }}
          provenance: false
          no-cache: true
