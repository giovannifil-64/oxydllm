# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — oxydLLM convenience launcher
#
# CUDA:    docker compose up oxydllm-cuda
# CPU:     docker compose up oxydllm-cpu
# Nightly: OXYDLLM_TAG=nightly docker compose up oxydllm-cuda
#
# Override the image tag:
#   OXYDLLM_TAG=v0.1.0 docker compose up oxydllm-cuda
#
# Override the image registry (e.g. for forks or private registries):
#   OXYDLLM_IMAGE=ghcr.io/myorg/oxydllm docker compose up oxydllm-cuda
# ─────────────────────────────────────────────────────────────────────────────

name: oxydllm

x-common: &common
  restart: unless-stopped
  volumes:
    - models:/root/.oxydllm/models
  ports:
    - "${OXYDLLM_PORT:-11313}:11313"
  environment:
    - RUST_LOG=${RUST_LOG:-warn}
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:11313/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  oxydllm-cuda:
    <<: *common
    image: ${OXYDLLM_IMAGE:-ghcr.io/giovannifil-64/oxydllm}:${OXYDLLM_TAG:-latest}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - start
      - --models-dir
      - /root/.oxydllm/models
      - --port
      - "11313"
      - --max-context-len
      - "${OXYDLLM_CONTEXT_LEN:-4096}"
    profiles: [cuda, default]

  oxydllm-cpu:
    <<: *common
    image: ${OXYDLLM_IMAGE:-ghcr.io/giovannifil-64/oxydllm}:${OXYDLLM_TAG:-cpu}
    command:
      - start
      - --models-dir
      - /root/.oxydllm/models
      - --port
      - "11313"
      - --max-context-len
      - "${OXYDLLM_CONTEXT_LEN:-4096}"
    profiles: [cpu]

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OXYDLLM_MODELS_DIR:-${HOME}/.oxydllm/models}
