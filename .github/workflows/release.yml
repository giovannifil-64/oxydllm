# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Build + publish on version tags
#
# Triggered by: push of a tag matching v* (e.g. v0.1.0)
#
# Calls the reusable build.yml workflow, then creates a GitHub Release
# with all binary artifacts attached.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify-ci:
    name: Verify CI passed on tagged commit
    runs-on: ubuntu-22.04
    steps:
      - name: Check CI conclusion for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          echo "Release tag: ${{ github.ref_name }}"
          echo "Commit:      $SHA"

          # Poll for up to 20 minutes in case CI has not yet completed for this
          # SHA (e.g. tag pushed immediately after merge).
          for i in $(seq 1 40); do
            PAYLOAD=$(gh run list \
              --commit "$SHA" \
              --workflow ci.yml \
              --limit 1 \
              --json status,conclusion,url 2>/dev/null || echo "[]")

            STATUS=$(echo "$PAYLOAD" | jq -r '.[0].status // empty')
            CONCLUSION=$(echo "$PAYLOAD" | jq -r '.[0].conclusion // empty')
            RUN_URL=$(echo "$PAYLOAD" | jq -r '.[0].url // empty')

            echo "[attempt $i/40] status=${STATUS:-<none>} conclusion=${CONCLUSION:-<none>}"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed for $SHA ✓ ($RUN_URL)"
                exit 0
              fi
              echo "::error::CI conclusion is '$CONCLUSION' for $SHA. Release aborted."
              echo "::error::See: $RUN_URL"
              exit 1
            fi

            sleep 30
          done

          echo "::error::CI did not complete within 20 minutes for $SHA."
          echo "::error::Either CI was never triggered (push the commit to main first) or it is stuck."
          exit 1

  build:
    name: Build all targets
    needs: verify-ci
    uses: ./.github/workflows/build.yml
    with:
      channel: release
      version_tag: ${{ github.ref_name }}
      push_docker: true
    permissions:
      contents: read
      packages: write

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: rllm-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Installation

            **macOS (Apple Silicon)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **Linux x86_64 (CUDA — Ada / Hopper / Blackwell / Blackwell Ultra / Blackwell consumer)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **Linux arm64 (CUDA — GH200 / DGX Spark / GB300 / Jetson Thor)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Installer auto-selects the right binary from detected GPU compute capability.
            Override with `RLLM_CUDA_TARGET=<ada|hopper|blackwell|blackwell-ultra|blackwell-consumer>` (x86_64)
            or `RLLM_CUDA_TARGET=<hopper|blackwell|blackwell-ultra|thor>` (arm64).

            **Linux (CPU only)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | RLLM_NO_GPU=1 sh
            ```

            **Docker (CUDA)**
            ```bash
            docker run --gpus all -p 11313:11313 \
              -v ~/.rllm/models:/root/.rllm/models \
              ghcr.io/${{ github.repository }}:latest start
            ```

            x86_64 explicit CUDA tags: `:cuda-ada`, `:cuda-hopper`, `:cuda-blackwell`, `:cuda-blackwell-ultra`, `:cuda-blackwell-consumer`.
            ARM64 explicit CUDA tags: `:cuda-hopper-arm64`, `:cuda-blackwell-arm64`, `:cuda-blackwell-ultra-arm64`, `:cuda-thor-arm64`.

            **Docker (CPU)**
            ```bash
            docker run -p 11313:11313 \
              -v ~/.rllm/models:/root/.rllm/models \
              ghcr.io/${{ github.repository }}:cpu start
            ```

            ## SHA-256 checksums
            See the `.sha256` files attached to this release.
