# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Compile checks + clippy + unit tests on every PR and push to main
#
# Does NOT build Docker images or publish artifacts (those happen in
# release.yml and nightly.yml).
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "install.sh"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "install.sh"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.94.1

# Cancel superseded runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format check (fast, runs first) ─────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --check

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # ── macOS: check + clippy + test with Metal feature ─────────────────────────
  check-macos:
    name: Check · macOS arm64 (Metal)
    needs: fmt
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check (Metal)
        run: cargo check --release

      - name: Clippy (Metal)
        run: cargo clippy --release -- -D warnings

      - name: Unit tests (Metal — CPU-only tests, no GPU needed)
        run: cargo test --release -- --test-threads=4

  # ── Linux: check + clippy + test CPU-only ───────────────────────────────────
  check-linux-cpu:
    name: Check · Linux x86_64 (CPU)
    needs: fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Check (CPU-only)
        run: cargo check --release --no-default-features

      - name: Clippy (CPU-only)
        run: cargo clippy --release --no-default-features -- -D warnings

      - name: Unit tests (CPU-only)
        run: cargo test --release --no-default-features -- --test-threads=4

  # ── Linux CUDA: compile + architecture tests (no GPU on runner) ─────────────
  check-linux-cuda:
    name: Check · Linux x86_64 (CUDA sm_${{ matrix.cuda_arch }})
    needs: fmt
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cuda_arch: ["89", "90", "100", "103", "120"]
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.cuda_arch }}
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu22.04
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl build-essential pkg-config libssl-dev git ca-certificates

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_TOOLCHAIN" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-x86_64-cuda-sm${{ matrix.cuda_arch }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check (CUDA)
        run: cargo check --no-default-features --features cuda

      - name: Prepare CUDA driver stubs for test runtime
        run: |
          test -f /usr/local/cuda/lib64/stubs/libcuda.so
          mkdir -p /tmp/cuda-stubs
          ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /tmp/cuda-stubs/libcuda.so.1

      - name: Model architecture regression tests (CPU logic, sm_89 compile target)
        if: matrix.cuda_arch == '89'
        run: |
          export LD_LIBRARY_PATH="/tmp/cuda-stubs:/usr/local/cuda/lib64/stubs:/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
          cargo test --release --no-default-features --features cuda -- --test-threads=4 arch_

  # ── Linux arm64 CPU: check + clippy ─────────────────────────────────────────
  check-linux-arm64-cpu:
    name: Check · Linux arm64 (CPU)
    needs: fmt
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Check (CPU-only)
        run: cargo check --release --no-default-features

      - name: Clippy (CPU-only)
        run: cargo clippy --release --no-default-features -- -D warnings

  # ── Linux arm64 CUDA: compile check (no GPU on runner) ──────────────────────
  check-linux-arm64-cuda:
    name: Check · Linux arm64 (CUDA sm_${{ matrix.cuda_arch }})
    needs: fmt
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        cuda_arch: ["90", "100", "103", "110"]
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.cuda_arch }}
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu22.04
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl build-essential pkg-config libssl-dev git ca-certificates

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_TOOLCHAIN" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-arm64-cuda-sm${{ matrix.cuda_arch }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check (CUDA)
        run: cargo check --no-default-features --features cuda
